<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>HTMX Space Invaders</title>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <style>
        body {
            background: #111;
            color: #0f0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: monospace;
        }
        .wrapper {
            text-align: center;
        }
        #game-container {
            position: relative;
            width: 600px;
            height: 400px;
            background: #000;
            border: 2px solid #333;
            overflow: hidden;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="wrapper">
        <h2>SCORE: <span id="score">0</span></h2>
        
        <div id="game-container" hx-get="/game" hx-trigger="every 200ms">
            </div>
    </div>
</body>
</html>
