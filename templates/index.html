<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>HTMX Space Invaders</title>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <style>
        body {
            background: #111;
            color: #0f0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: monospace;
        }
        .wrapper {
            text-align: center;
        }
        #game-container {
            position: relative;
            width: 600px;
            height: 400px;
            background: #000;
            border: 2px solid #333;
            overflow: hidden;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="wrapper">
        <h2>SCORE: <span id="score" hx-get="/score" hx-trigger="every 100ms">0</span></h2>
        
        <div id="game-container" hx-get="/game" hx-trigger="every 100ms"></div>

        <script>
            window.addEventListener('keydown', function(e) {
                if(e.key === 'ArrowLeft') {
                    e.preventDefault();
                    htmx.ajax('POST', '/move-left', {target: '#game-container', swap: 'none'});
                } else if(e.key === 'ArrowRight') {
                    e.preventDefault();
                    htmx.ajax('POST', '/move-right', {target: '#game-container', swap: 'none'});
                } else if(e.key === ' ' || e.key === 'Spacebar') {
                    e.preventDefault();
                    htmx.ajax('POST', '/shoot', {target: '#game-container', swap: 'none'});
                }
            });
        </script>
    </div>
</body>
</html>
