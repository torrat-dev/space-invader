<!DOCTYPE html>
<html>

<head>
    <title>Alien Invaders</title>
    <style>
        #game-area {
            width: 600px;
            height: 400px;
            border: 1px solid black;
            position: relative;
            overflow: hidden;
        }

        .spaceship {
            width: 50px;
            height: 20px;
            background-color: green;
            position: absolute;
            bottom: 20px;
            left: 275px;
            /* Start in the middle */
        }

        .alien {
            background-color: red;
            position: absolute;
        }

        .projectile {
            width: 5px;
            height: 10px;
            background-color: blue;
            position: absolute;
        }
    </style>
</head>

<body>

    <div id="game-area">
        <div class="spaceship"></div>
    </div>

    <script>
        var websocket = new WebSocket("ws://localhost:8080/ws");

        websocket.onopen = function (event) {
            websocket.send(JSON.stringify({ direction: 0 }));
        };

        websocket.onmessage = function (event) {
            var gameState = JSON.parse(event.data);
            
            // Update spaceship position
            var spaceship = document.querySelector('.spaceship');
            spaceship.style.left = gameState.Spaceship.X + 'px';

            // Update aliens
            var gameArea = document.getElementById('game-area');
            gameArea.querySelectorAll('.alien').forEach(alien => alien.remove());
            gameState.Aliens.forEach(alien => {
                var alienDiv = document.createElement('div');
                alienDiv.classList.add('alien');
                alienDiv.style.left = alien.X + 'px';
                alienDiv.style.top = alien.Y + 'px';
                alienDiv.style.height = alien.Height + 'px';
                alienDiv.style.width = alien.Width + 'px';
                gameArea.appendChild(alienDiv);
            });

            // Update projectiles
            gameArea.querySelectorAll('.projectile').forEach(projectile => projectile.remove());
            gameState.Projectiles.forEach(projectile => {
                var projectileDiv = document.createElement('div');
                projectileDiv.classList.add('projectile');
                projectileDiv.style.left = projectile.X + 'px';
                projectileDiv.style.top = projectile.Y + 'px';
                gameArea.appendChild(projectileDiv);
            });
        };

        // Handle WebSocket errors
        websocket.onerror = function (event) {
            console.error("WebSocket error:", event);
        };

        // Handle WebSocket closure
        websocket.onclose = function (event) {
            console.log("WebSocket connection closed.");
        };

        // Keyboard controls
        document.addEventListener('keydown', function (event) {
            if (event.key === 'ArrowLeft' || event.key === 'a') {
                websocket.send(JSON.stringify({ direction: -1 }));
            } else if (event.key === 'ArrowRight' || event.key === 'd') {
                websocket.send(JSON.stringify({ direction: 1 }));
            }
        });
    </script>

</body>

</html>
